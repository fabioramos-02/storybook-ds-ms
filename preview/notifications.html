<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8" />
<title>Preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { display: block; padding: 20px 24px; font-family: var(--font-family-roboto); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .label-mono { font-family: var(--font-family-mono); font-size: 11px; color: var(--content-secondary); letter-spacing: .025em; }
  .swatch {
    flex: 1; min-width: 0; min-height: 96px;
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-family-roboto);
    color: #fff;
  }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1; }
  .swatch .hex  { font-family: var(--font-family-mono); font-size: 11px; opacity: .85; letter-spacing: .03em; }
  .swatch.light { color: #0A0909; }
  .swatch.outlined { border: 1px solid var(--color-neutral-100); }
  
</style>
</head><body>
<div class="col" style="gap:10px;">
  <div class="notification">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <div>Esta é uma notificação informativa explicando o contexto atual.</div>
  </div>
  <div class="notification is-success">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1 15l-5-5 1.4-1.4L11 14.2l6.6-6.6L19 9l-8 8z"/></svg>
    <div>Operação concluída com sucesso.</div>
  </div>
  <div class="notification is-error">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm5 13.6L15.6 17 12 13.4 8.4 17 7 15.6 10.6 12 7 8.4 8.4 7 12 10.6 15.6 7 17 8.4 13.4 12 17 15.6z"/></svg>
    <div>Houve um erro ao processar sua solicitação.</div>
  </div>
</div>
</body></html>
