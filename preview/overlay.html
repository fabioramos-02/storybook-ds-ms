<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8" />
<title>Preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { display: block; padding: 20px 24px; font-family: var(--font-family-roboto); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .label-mono { font-family: var(--font-family-mono); font-size: 11px; color: var(--content-secondary); letter-spacing: .025em; }
  .swatch {
    flex: 1; min-width: 0; min-height: 96px;
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-family-roboto);
    color: #fff;
  }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1; }
  .swatch .hex  { font-family: var(--font-family-mono); font-size: 11px; opacity: .85; letter-spacing: .03em; }
  .swatch.light { color: #0A0909; }
  .swatch.outlined { border: 1px solid var(--color-neutral-100); }
  
</style>
</head><body>
<div style="position:relative;height:200px;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#067BCC 0%,#004F9F 100%);">
  <div style="position:absolute;inset:0;background:rgba(1,15,30,0.5);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;gap:6px;">
    <div style="font-family:'Open Sans';font-weight:700;font-size:20px;">Overlay scrim</div>
    <div class="label-mono" style="color:rgba(255,255,255,.8);">rgba(1, 15, 30, 0.5)</div>
  </div>
</div>
</body></html>
