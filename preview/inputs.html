<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8" />
<title>Preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { display: block; padding: 20px 24px; font-family: var(--font-family-roboto); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .label-mono { font-family: var(--font-family-mono); font-size: 11px; color: var(--content-secondary); letter-spacing: .025em; }
  .swatch {
    flex: 1; min-width: 0; min-height: 96px;
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-family-roboto);
    color: #fff;
  }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1; }
  .swatch .hex  { font-family: var(--font-family-mono); font-size: 11px; opacity: .85; letter-spacing: .03em; }
  .swatch.light { color: #0A0909; }
  .swatch.outlined { border: 1px solid var(--color-neutral-100); }
  
</style>
</head><body>
<div class="col" style="gap:16px;">
  <div class="row" style="gap:14px;">
    <div class="field" style="max-width:280px;">
      <label class="field-label">Título</label>
      <input class="field-input" placeholder="Texto demonstrativo" />
      <div class="field-helper">Texto de ajuda</div>
    </div>
    <div class="field" style="max-width:280px;">
      <label class="field-label">Com foco</label>
      <input class="field-input" value="Texto digitado" style="border-color:#004F9F;box-shadow:0 0 0 2px rgba(0,79,159,.15);" />
      <div class="field-helper">Texto de ajuda</div>
    </div>
  </div>
  <div class="row" style="gap:14px;">
    <div class="field" style="max-width:280px;">
      <label class="field-label">Erro</label>
      <input class="field-input is-error" value="email@invalido" />
      <div class="field-helper is-error">Endereço de e-mail inválido</div>
    </div>
    <div class="field" style="max-width:280px;">
      <label class="field-label" style="color:#A9AEB1;">Desabilitado</label>
      <input class="field-input" value="Não editável" disabled />
      <div class="field-helper">Campo bloqueado</div>
    </div>
  </div>
</div>
</body></html>
