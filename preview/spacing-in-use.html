<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8" />
<title>Preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { display: block; padding: 20px 24px; font-family: var(--font-family-roboto); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .label-mono { font-family: var(--font-family-mono); font-size: 11px; color: var(--content-secondary); letter-spacing: .025em; }
  .swatch {
    flex: 1; min-width: 0; min-height: 96px;
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-family-roboto);
    color: #fff;
  }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1; }
  .swatch .hex  { font-family: var(--font-family-mono); font-size: 11px; opacity: .85; letter-spacing: .03em; }
  .swatch.light { color: #0A0909; }
  .swatch.outlined { border: 1px solid var(--color-neutral-100); }
  
</style>
</head><body>
<div style="display:flex;flex-direction:column;gap:24px;">
  <div>
    <div class="label-mono" style="margin-bottom:6px;">gap: 32px · padrão entre seções</div>
    <div style="display:flex;gap:32px;">
      <div style="height:48px;flex:1;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:48px;flex:1;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:48px;flex:1;background:#CCDCEC;border-radius:4px;"></div>
    </div>
  </div>
  <div>
    <div class="label-mono" style="margin-bottom:6px;">gap: 16px · cards internos</div>
    <div style="display:flex;gap:16px;">
      <div style="height:48px;flex:1;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:48px;flex:1;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:48px;flex:1;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:48px;flex:1;background:#CCDCEC;border-radius:4px;"></div>
    </div>
  </div>
  <div>
    <div class="label-mono" style="margin-bottom:6px;">gap: 8px · linhas de meta</div>
    <div style="display:flex;gap:8px;">
      <div style="height:24px;width:60px;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:24px;width:60px;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:24px;width:60px;background:#CCDCEC;border-radius:4px;"></div>
      <div style="height:24px;width:60px;background:#CCDCEC;border-radius:4px;"></div>

  </div>
</div>
