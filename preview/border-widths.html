<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8" />
<title>Preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { display: block; padding: 20px 24px; font-family: var(--font-family-roboto); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .label-mono { font-family: var(--font-family-mono); font-size: 11px; color: var(--content-secondary); letter-spacing: .025em; }
  .swatch {
    flex: 1; min-width: 0; min-height: 96px;
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-family-roboto);
    color: #fff;
  }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1; }
  .swatch .hex  { font-family: var(--font-family-mono); font-size: 11px; opacity: .85; letter-spacing: .03em; }
  .swatch.light { color: #0A0909; }
  .swatch.outlined { border: 1px solid var(--color-neutral-100); }
  
</style>
</head><body>
<div class="row" style="gap:14px;">

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:72px;height:72px;border:1px solid #004F9F;border-radius:8px;background:#fff;"></div>
    <div class="label-mono">1px</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:72px;height:72px;border:2px solid #004F9F;border-radius:8px;background:#fff;"></div>
    <div class="label-mono">2px</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:72px;height:72px;border:4px solid #004F9F;border-radius:8px;background:#fff;"></div>
    <div class="label-mono">4px</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:72px;height:72px;border:8px solid #004F9F;border-radius:8px;background:#fff;"></div>
    <div class="label-mono">8px</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:72px;height:72px;border:16px solid #004F9F;border-radius:8px;background:#fff;"></div>
    <div class="label-mono">16px</div>
  </div>
</div>
</body></html>
