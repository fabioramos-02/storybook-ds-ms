<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8" />
<title>Preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { display: block; padding: 20px 24px; font-family: var(--font-family-roboto); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .label-mono { font-family: var(--font-family-mono); font-size: 11px; color: var(--content-secondary); letter-spacing: .025em; }
  .swatch {
    flex: 1; min-width: 0; min-height: 96px;
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-family-roboto);
    color: #fff;
  }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1; }
  .swatch .hex  { font-family: var(--font-family-mono); font-size: 11px; opacity: .85; letter-spacing: .03em; }
  .swatch.light { color: #0A0909; }
  .swatch.outlined { border: 1px solid var(--color-neutral-100); }
  
</style>
</head><body>
<div class="row" style="gap:10px;">

  <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
    <div class="swatch" style="background:#DA1E28;min-height:72px;"><div class="name">Erro</div><div class="hex">#DA1E28</div></div>
    <div class="label-mono" style="font-size:11px;line-height:1.3;color:var(--content-secondary);">Error / E — destrutivo, validação</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
    <div class="swatch" style="background:#198038;min-height:72px;"><div class="name">Sucesso</div><div class="hex">#198038</div></div>
    <div class="label-mono" style="font-size:11px;line-height:1.3;color:var(--content-secondary);">Success / S — confirmações</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
    <div class="swatch" style="background:#FF6200;min-height:72px;"><div class="name">Alerta</div><div class="hex">#FF6200</div></div>
    <div class="label-mono" style="font-size:11px;line-height:1.3;color:var(--content-secondary);">Warning / A — atenção</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
    <div class="swatch" style="background:#FF5E40;min-height:72px;"><div class="name">Suporte</div><div class="hex">#FF5E40</div></div>
    <div class="label-mono" style="font-size:11px;line-height:1.3;color:var(--content-secondary);">Support / S — secundário</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
    <div class="swatch" style="background:#067BCC;min-height:72px;"><div class="name">Info</div><div class="hex">#067BCC</div></div>
    <div class="label-mono" style="font-size:11px;line-height:1.3;color:var(--content-secondary);">Info / I — neutro informativo</div>
  </div>
</div></body></html>
