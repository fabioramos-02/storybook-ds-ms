<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8" />
<title>Preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { display: block; padding: 20px 24px; font-family: var(--font-family-roboto); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .label-mono { font-family: var(--font-family-mono); font-size: 11px; color: var(--content-secondary); letter-spacing: .025em; }
  .swatch {
    flex: 1; min-width: 0; min-height: 96px;
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-family-roboto);
    color: #fff;
  }
  .swatch .name { font-weight: 700; font-size: 14px; line-height: 1; }
  .swatch .hex  { font-family: var(--font-family-mono); font-size: 11px; opacity: .85; letter-spacing: .03em; }
  .swatch.light { color: #0A0909; }
  .swatch.outlined { border: 1px solid var(--color-neutral-100); }
  
</style>
</head><body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">

  <div style="background:#004F9F;color:#fff;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">background-brand</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#004F9F</div>
  </div>
  <div style="background:#CCDCEC;color:#002040;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">background-brand-soft</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#CCDCEC</div>
  </div>
  <div style="background:#FFFFFF;color:#0A0909;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">background-default</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#FFFFFF</div>
  </div>
  <div style="background:#EAEBEC;color:#0A0909;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">background-subtle</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#EAEBEC</div>
  </div>
  <div style="background:#212A31;color:#fff;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">content-primary</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#212A31</div>
  </div>
  <div style="background:#6E757A;color:#fff;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">content-secondary</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#6E757A</div>
  </div>
  <div style="background:#A9AEB1;color:#0A0909;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">border-default</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#A9AEB1</div>
  </div>
  <div style="background:#004F9F;color:#fff;border:1px solid #eee;border-radius:6px;padding:12px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="font-family:var(--font-family-mono);font-size:11px;letter-spacing:.02em;opacity:.95;">border-brand-strong</div>
    <div style="font-family:var(--font-family-mono);font-size:10px;opacity:.75;">#004F9F</div>
  </div>
</div></body></html>
