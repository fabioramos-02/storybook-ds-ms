<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>DS-MS · Admin Template</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <style>
    html, body { margin: 0; background: #F9F9F9; min-height: 100%; }
    table { border-collapse: collapse; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="AdminSidebar.jsx"></script>
  <script type="text/babel" src="DataTable.jsx"></script>
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel" src="ErrorScreen.jsx"></script>

  <script type="text/babel">
    function App() {
      const [screen, setScreen] = React.useState('login'); // login | dashboard | error
      const [user, setUser] = React.useState(null);

      const onLogin = (u) => { setUser(u); setScreen('dashboard'); };
      const onLogout = () => { setUser(null); setScreen('login'); };

      // Quick demo switcher (floating)
      const switcher = (
        <div style={{
          position: 'fixed', bottom: 16, right: 16, zIndex: 50,
          background: '#fff', border: '1px solid #EAEBEC', borderRadius: 8,
          padding: 8, display: 'flex', gap: 6, boxShadow: '0 4px 8px rgba(0,32,64,.18)',
        }}>
          {['login', 'dashboard', 'error'].map(s => (
            <button key={s}
              className={`btn btn-sm ${screen === s ? 'btn-primary' : 'btn-simple'}`}
              onClick={() => setScreen(s)}>{s}</button>
          ))}
        </div>
      );

      const view = ({
        login:     <LoginScreen onLogin={onLogin} />,
        dashboard: <DashboardScreen user={user} onLogout={onLogout} />,
        error:     <ErrorScreen onBack={() => setScreen('dashboard')} />,
      })[screen];

      return <>{view}{switcher}</>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
