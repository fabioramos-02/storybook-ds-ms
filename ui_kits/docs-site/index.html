<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>DS-MS · Documentação</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <style>
    body { background: #fff; overflow-x: hidden; }
    .page {
      width: 1440px;
      max-width: 100%;
      margin: 0 auto;
    }
    .doc-body {
      display: flex;
      gap: 32px;
      padding: 0 112px;
      align-items: flex-start;
      min-height: calc(100vh - 192px);
    }
    .doc-body .content {
      flex: 1;
      padding: 40px 0 80px;
      border-left: 1px solid #D9D9D9;
      padding-left: 32px;
    }
    .doc-body .right-nav {
      width: 176px;
      flex: none;
      padding: 40px 0 0;
      position: sticky;
      top: 96px;
    }
    .right-nav h4 {
      font-family: var(--font-family-roboto);
      font-size: 12px;
      font-weight: 700;
      color: var(--content-primary);
      margin: 0 0 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #D9D9D9;
    }
    .right-nav a {
      display: block;
      padding: 4px 0;
      font-family: var(--font-family-roboto);
      font-size: 12px;
      color: var(--content-primary);
      text-decoration: none;
    }
    .right-nav a.is-active { color: var(--color-primary-500); font-weight: 700; }
    .right-nav a:hover { color: var(--color-primary-500); }
  </style>
</head>
<body>
  <div id="root" class="page"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="DSHeader.jsx"></script>
  <script type="text/babel" src="DSFooter.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Swatch.jsx"></script>
  <script type="text/babel" src="CodeBlock.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>

  <script type="text/babel">
    const RIGHT_NAV = {
      welcome:    [['O que é um Design System', 'O que é um Design System'], ['Fundamentos', 'Fundamentos'], ['Recursos', 'Recursos']],
      colors:     [['Cores Base', 'Cores Base'], ['Cor Primária', 'Cor Primária'], ['Cor Neutra', 'Cor Neutra'], ['Cor Feedback Erro', 'Cor Feedback Erro']],
      type:       [['Font Family', 'Font Family'], ['Font Weight', 'Font Weight'], ['Display', 'Display'], ['Heading', 'Heading'], ['Body', 'Body']],
      components: [['Botões', 'Botões'], ['Input de Texto', 'Input de Texto'], ['Seleção', 'Seleção']],
    };

    function App() {
      const [current, setCurrent] = React.useState(() => location.hash.replace('#','') || 'welcome');

      React.useEffect(() => {
        const onHash = () => setCurrent(location.hash.replace('#','') || 'welcome');
        addEventListener('hashchange', onHash);
        return () => removeEventListener('hashchange', onHash);
      }, []);

      const select = (id) => {
        location.hash = id;
        setCurrent(id);
        scrollTo({ top: 0, behavior: 'smooth' });
      };

      const screen = ({
        welcome: <WelcomeScreen />,
        colors: <ColorsScreen />,
        type: <TypeScreen />,
        components: <ComponentsScreen />,
      })[current] || <WelcomeScreen />;

      const rightItems = RIGHT_NAV[current] || RIGHT_NAV.welcome;

      return (
        <>
          <DSHeader active="docs" />
          <div className="doc-body" data-screen-label={`Docs · ${current}`}>
            <Sidebar current={current} onSelect={select} />
            <div className="content">{screen}</div>
            <div className="right-nav">
              <h4>Nesta página</h4>
              {rightItems.map(([id, label], i) => (
                <a key={id} href={`#${id}`} className={i === 0 ? 'is-active' : ''}>{label}</a>
              ))}
            </div>
          </div>
          <DSFooter />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
