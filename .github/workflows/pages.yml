name: Deploy Storybook + exemplo (GitHub Pages)

on:
  push:
    branches: [main]
    paths: ["poc/**", "exemplo-consumo/**", ".github/workflows/pages.yml"]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            poc/package-lock.json
            exemplo-consumo/package-lock.json

      - name: Buildar Storybook (site raiz)
        working-directory: poc
        run: |
          npm ci
          npm run build-storybook

      - name: Instalar @design-system-ms/ds-sis publicado (exemplo de consumo real)
        working-directory: exemplo-consumo
        run: npm ci

      - name: Montar site combinado (raiz = Storybook, /exemplo-consumo = demo via npm)
        run: |
          mkdir -p public-site/exemplo-consumo
          cp -r poc/storybook-static/. public-site/
          cp exemplo-consumo/index.html public-site/exemplo-consumo/
          cp -r exemplo-consumo/node_modules public-site/exemplo-consumo/node_modules

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
