name: PR Preview — Storybook

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages-previews
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            Preview do Storybook desta PR:
            https://fabioramos-02.github.io/storybook-ds-ms/pr-${{ github.event.pull_request.number }}/

            _Atualizado a cada push em `${{ github.head_ref }}`._

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout previews branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages-previews
          fetch-depth: 0
        continue-on-error: true

      - name: Remove PR directory
        run: |
          if [ -d "pr-${{ github.event.pull_request.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "pr-${{ github.event.pull_request.number }}"
            git commit -m "cleanup: remove preview PR #${{ github.event.pull_request.number }}"
            git push
          fi
